<html>

<head>
    <meta charset="UTF-8">

    <title>Login | DDAC</title>

    <link rel="stylesheet" href="../CSS/style-ofc.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Zalando+Sans+SemiExpanded:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <section class="cadastrar">
        <div class="container-cadastro-geral">
            <div class="cadastro-cabecalho">
                <img src="../IMAGENS/logos/DDAC-simbolo.png" width="200px">
                <h1>Login</h1>
            </div>
            <form>
                <div class="container-cadastro-bloco">
                    <p>E-mail ou nome de usuário</p>
                    <input type="email">
                </div>
                <div class="container-cadastro-bloco">
                    <p>Senha</p>
                    <input type="password">
                </div>
                <div class="container-cadastro-enviar">
                    <a href="#" class="botao-enviar">
                        <b>Limpar</b>
                    </a>
                    <a href="./pedido.html" class="botao-enviar">
                        <b>Enviar</b>
                    </a>
                </div>
            </form>
            <section class="pedido-contato">
                <p>Não possui login? <a href="./casdastrar.html">Cadastre-se</a></p>
            </section>
        </div>
        <div class="container-imagem">
            <img src="../IMAGENS/cadastrar/imagem-ilustrativa-ofc.png" width="500px">
        </div>
    </section>
</body>

</html>
